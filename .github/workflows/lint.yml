name: Lint

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check bash syntax
        run: |
          bash -n knobster.sh
          bash -n install.sh
          bash -n uninstall.sh

      - name: Shellcheck
        run: |
          sudo apt-get install -y -qq shellcheck
          shellcheck knobster.sh install.sh uninstall.sh

      - name: Check version consistency
        run: |
          SCRIPT_VERSION=$(grep '^VERSION=' knobster.sh | cut -d'"' -f2)
          CHANGELOG_VERSION=$(grep '^## \[' CHANGELOG.md | head -1 | grep -oP '\[\K[^\]]+')
          if [ "$SCRIPT_VERSION" != "$CHANGELOG_VERSION" ]; then
            echo "ERROR: Version mismatch! knobster.sh: $SCRIPT_VERSION, CHANGELOG.md: $CHANGELOG_VERSION"
            exit 1
          fi
          echo "Version OK: $SCRIPT_VERSION"
